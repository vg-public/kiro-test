openapi: 3.1.0
info:
  title: ShopWire API
  version: 1.0.0
  description: |
    REST API contract for the ShopWire eCommerce platform.
    Both front-end and back-end teams develop against this contract independently.
    Base URL: https://api.shopwire.dev/v1

servers:
  - url: https://api.shopwire.dev/v1
    description: Production
  - url: http://localhost:4000/v1
    description: Local development

# ── Security ────────────────────────────────────────────────
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ── Reusable Parameters ──────────────────────────────────
  parameters:
    PageParam:
      name: page
      in: query
      schema: { type: integer, default: 1, minimum: 1 }
    LimitParam:
      name: limit
      in: query
      schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
    ProductId:
      name: productId
      in: path
      required: true
      schema: { type: string, format: uuid }
    OrderId:
      name: orderId
      in: path
      required: true
      schema: { type: string, format: uuid }
    CartItemId:
      name: cartItemId
      in: path
      required: true
      schema: { type: integer }

  # ── Reusable Schemas ─────────────────────────────────────
  schemas:

    # ── Pagination wrapper ──
    Pagination:
      type: object
      properties:
        page:     { type: integer }
        limit:    { type: integer }
        total:    { type: integer }
        pages:    { type: integer }

    # ── Error ──
    Error:
      type: object
      required: [code, message]
      properties:
        code:    { type: string, example: NOT_FOUND }
        message: { type: string, example: Resource not found }
        details: { type: object }

    # ── Auth ──
    RegisterRequest:
      type: object
      required: [email, password, first_name, last_name]
      properties:
        email:      { type: string, format: email }
        password:   { type: string, minLength: 8 }
        first_name: { type: string }
        last_name:  { type: string }
        phone:      { type: string }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:    { type: string, format: email }
        password: { type: string }

    AuthResponse:
      type: object
      properties:
        access_token:  { type: string }
        token_type:    { type: string, example: Bearer }
        expires_in:    { type: integer, example: 900 }
        user:          { $ref: '#/components/schemas/UserProfile' }

    UserProfile:
      type: object
      properties:
        user_id:     { type: string, format: uuid }
        email:       { type: string }
        first_name:  { type: string }
        last_name:   { type: string }
        phone:       { type: string, nullable: true }
        is_verified: { type: boolean }
        created_at:  { type: string, format: date-time }

    # ── Address ──
    Address:
      type: object
      properties:
        address_id:  { type: string, format: uuid }
        label:       { type: string, example: Home }
        full_name:   { type: string }
        line1:       { type: string }
        line2:       { type: string, nullable: true }
        city:        { type: string }
        state:       { type: string }
        postal_code: { type: string }
        country:     { type: string, example: US }
        is_default:  { type: boolean }

    AddressRequest:
      type: object
      required: [full_name, line1, city, state, postal_code, country]
      properties:
        label:       { type: string }
        full_name:   { type: string }
        line1:       { type: string }
        line2:       { type: string }
        city:        { type: string }
        state:       { type: string }
        postal_code: { type: string }
        country:     { type: string, default: US }
        is_default:  { type: boolean, default: false }

    # ── Category ──
    Category:
      type: object
      properties:
        category_id: { type: integer }
        parent_id:   { type: integer, nullable: true }
        name:        { type: string }
        slug:        { type: string }
        image_url:   { type: string, nullable: true }
        children:
          type: array
          items: { $ref: '#/components/schemas/Category' }

    # ── Product (listing card) ──
    ProductSummary:
      type: object
      properties:
        product_id:     { type: string, format: uuid }
        title:          { type: string }
        slug:           { type: string }
        brand:          { type: string, nullable: true }
        category:       { type: string }
        primary_image:  { type: string, nullable: true }
        base_price:     { type: number, format: float }
        sale_price:     { type: number, format: float, nullable: true }
        currency:       { type: string, example: USD }
        discount_pct:   { type: integer, nullable: true }
        badge:          { type: string, nullable: true }
        avg_rating:     { type: number, format: float }
        review_count:   { type: integer }
        is_prime:       { type: boolean }
        in_stock:       { type: boolean }

    # ── Product (detail page) ──
    ProductDetail:
      allOf:
        - $ref: '#/components/schemas/ProductSummary'
        - type: object
          properties:
            description:   { type: string, nullable: true }
            bullet_points: { type: array, items: { type: string } }
            images:
              type: array
              items:
                type: object
                properties:
                  url:        { type: string }
                  alt_text:   { type: string }
                  is_primary: { type: boolean }
            variants:
              type: array
              items: { $ref: '#/components/schemas/Variant' }

    # ── Variant ──
    Variant:
      type: object
      properties:
        variant_id:  { type: string, format: uuid }
        sku:         { type: string }
        title:       { type: string }
        price:       { type: number, format: float }
        stock_qty:   { type: integer }
        is_active:   { type: boolean }
        attributes:
          type: array
          items:
            type: object
            properties:
              name:  { type: string, example: Color }
              value: { type: string, example: Black }

    # ── Review ──
    Review:
      type: object
      properties:
        review_id:     { type: string, format: uuid }
        user_name:     { type: string }
        rating:        { type: integer, minimum: 1, maximum: 5 }
        title:         { type: string, nullable: true }
        body:          { type: string, nullable: true }
        is_verified:   { type: boolean }
        helpful_count: { type: integer }
        created_at:    { type: string, format: date-time }

    ReviewRequest:
      type: object
      required: [rating]
      properties:
        rating: { type: integer, minimum: 1, maximum: 5 }
        title:  { type: string }
        body:   { type: string }

    # ── Cart ──
    Cart:
      type: object
      properties:
        cart_id: { type: string, format: uuid }
        items:
          type: array
          items: { $ref: '#/components/schemas/CartItem' }
        subtotal:       { type: number, format: float }
        item_count:     { type: integer }

    CartItem:
      type: object
      properties:
        cart_item_id: { type: integer }
        variant_id:   { type: string, format: uuid }
        product_id:   { type: string, format: uuid }
        title:        { type: string }
        variant_title:{ type: string }
        image_url:    { type: string, nullable: true }
        unit_price:   { type: number, format: float }
        quantity:     { type: integer }
        line_total:   { type: number, format: float }
        is_prime:     { type: boolean }

    AddToCartRequest:
      type: object
      required: [variant_id, quantity]
      properties:
        variant_id: { type: string, format: uuid }
        quantity:   { type: integer, minimum: 1, default: 1 }

    UpdateCartItemRequest:
      type: object
      required: [quantity]
      properties:
        quantity: { type: integer, minimum: 1 }

    # ── Order ──
    OrderSummary:
      type: object
      properties:
        order_id:      { type: string, format: uuid }
        status:        { type: string, enum: [pending, confirmed, processing, shipped, delivered, cancelled, refunded] }
        total_amount:  { type: number, format: float }
        currency:      { type: string }
        item_count:    { type: integer }
        created_at:    { type: string, format: date-time }

    OrderDetail:
      allOf:
        - $ref: '#/components/schemas/OrderSummary'
        - type: object
          properties:
            shipping_address: { $ref: '#/components/schemas/Address' }
            subtotal:         { type: number, format: float }
            shipping_cost:    { type: number, format: float }
            tax_amount:       { type: number, format: float }
            discount_amount:  { type: number, format: float }
            notes:            { type: string, nullable: true }
            items:
              type: array
              items: { $ref: '#/components/schemas/OrderItem' }
            shipments:
              type: array
              items: { $ref: '#/components/schemas/Shipment' }

    OrderItem:
      type: object
      properties:
        order_item_id:  { type: integer }
        product_title:  { type: string }
        variant_title:  { type: string }
        unit_price:     { type: number, format: float }
        quantity:       { type: integer }
        line_total:     { type: number, format: float }

    PlaceOrderRequest:
      type: object
      required: [address_id]
      properties:
        address_id:  { type: string, format: uuid }
        coupon_code: { type: string }
        notes:       { type: string }

    # ── Shipment ──
    Shipment:
      type: object
      properties:
        shipment_id:     { type: string, format: uuid }
        carrier:         { type: string, nullable: true }
        tracking_number: { type: string, nullable: true }
        shipped_at:      { type: string, format: date-time, nullable: true }
        estimated_at:    { type: string, format: date-time, nullable: true }
        delivered_at:    { type: string, format: date-time, nullable: true }

    # ── Coupon ──
    CouponValidateRequest:
      type: object
      required: [code]
      properties:
        code:        { type: string }
        cart_total:  { type: number, format: float }

    CouponValidateResponse:
      type: object
      properties:
        valid:          { type: boolean }
        discount_type:  { type: string, enum: [percentage, fixed_amount, free_shipping] }
        discount_value: { type: number, format: float }
        message:        { type: string }

    # ── Wishlist ──
    WishlistItem:
      type: object
      properties:
        wishlist_id: { type: integer }
        product:     { $ref: '#/components/schemas/ProductSummary' }
        variant_id:  { type: string, format: uuid }
        added_at:    { type: string, format: date-time }

    # ── Search ──
    SearchResponse:
      type: object
      properties:
        query:      { type: string }
        pagination: { $ref: '#/components/schemas/Pagination' }
        results:
          type: array
          items: { $ref: '#/components/schemas/ProductSummary' }
        facets:
          type: object
          properties:
            categories:
              type: array
              items:
                type: object
                properties:
                  name:  { type: string }
                  count: { type: integer }
            brands:
              type: array
              items:
                type: object
                properties:
                  name:  { type: string }
                  count: { type: integer }
            price_range:
              type: object
              properties:
                min: { type: number }
                max: { type: number }


# ════════════════════════════════════════════════════════════
#  PATHS
# ════════════════════════════════════════════════════════════
paths:

  # ── AUTH ─────────────────────────────────────────────────

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '201':
          description: User created — verification email sent
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '409':
          description: Email already registered
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and receive access token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token using httpOnly refresh cookie
      responses:
        '200':
          description: New access token issued
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '401':
          description: Refresh token invalid or expired
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Invalidate refresh token
      security: [{ BearerAuth: [] }]
      responses:
        '204':
          description: Logged out

  /auth/verify-email:
    get:
      tags: [Auth]
      summary: Verify email address via token link
      parameters:
        - name: token
          in: query
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Email verified
        '400':
          description: Invalid or expired token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '204':
          description: Reset email sent (always 204 to prevent enumeration)

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password using token from email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:    { type: string }
                password: { type: string, minLength: 8 }
      responses:
        '204':
          description: Password updated
        '400':
          description: Invalid or expired token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ── USER ─────────────────────────────────────────────────

  /users/me:
    get:
      tags: [User]
      summary: Get current user profile
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserProfile' }
    patch:
      tags: [User]
      summary: Update current user profile
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name: { type: string }
                last_name:  { type: string }
                phone:      { type: string }
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserProfile' }

  /users/me/addresses:
    get:
      tags: [User]
      summary: List saved addresses
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Address list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Address' }
    post:
      tags: [User]
      summary: Add a new address
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddressRequest' }
      responses:
        '201':
          description: Address created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Address' }

  /users/me/addresses/{addressId}:
    parameters:
      - name: addressId
        in: path
        required: true
        schema: { type: string, format: uuid }
    put:
      tags: [User]
      summary: Update an address
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddressRequest' }
      responses:
        '200':
          description: Updated address
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Address' }
    delete:
      tags: [User]
      summary: Delete an address
      security: [{ BearerAuth: [] }]
      responses:
        '204':
          description: Deleted

  # ── CATEGORIES ───────────────────────────────────────────

  /categories:
    get:
      tags: [Catalog]
      summary: Get full category tree
      responses:
        '200':
          description: Nested category tree
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Category' }

  # ── PRODUCTS ─────────────────────────────────────────────

  /products:
    get:
      tags: [Catalog]
      summary: List / filter products (product listing page)
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: category
          in: query
          schema: { type: string }
          description: Category slug
        - name: brand
          in: query
          schema: { type: string }
          description: Brand slug
        - name: price_min
          in: query
          schema: { type: number }
        - name: price_max
          in: query
          schema: { type: number }
        - name: rating
          in: query
          schema: { type: integer, minimum: 1, maximum: 5 }
          description: Minimum average rating
        - name: prime
          in: query
          schema: { type: boolean }
        - name: in_stock
          in: query
          schema: { type: boolean }
        - name: badge
          in: query
          schema: { type: string }
        - name: sort
          in: query
          schema:
            type: string
            enum: [featured, price_asc, price_desc, rating, newest]
            default: featured
      responses:
        '200':
          description: Paginated product list with facets
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SearchResponse' }

  /products/{productId}:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    get:
      tags: [Catalog]
      summary: Get product detail
      responses:
        '200':
          description: Full product detail with variants and images
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductDetail' }
        '404':
          description: Product not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /products/{productId}/reviews:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    get:
      tags: [Catalog]
      summary: List reviews for a product
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: sort
          in: query
          schema:
            type: string
            enum: [recent, helpful, rating_asc, rating_desc]
            default: helpful
      responses:
        '200':
          description: Paginated reviews
          content:
            application/json:
              schema:
                type: object
                properties:
                  pagination: { $ref: '#/components/schemas/Pagination' }
                  rating_breakdown:
                    type: object
                    properties:
                      5: { type: integer }
                      4: { type: integer }
                      3: { type: integer }
                      2: { type: integer }
                      1: { type: integer }
                  reviews:
                    type: array
                    items: { $ref: '#/components/schemas/Review' }
    post:
      tags: [Catalog]
      summary: Submit a review (verified purchase required)
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReviewRequest' }
      responses:
        '201':
          description: Review submitted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Review' }
        '403':
          description: No verified purchase for this product
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: Review already submitted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ── SEARCH ───────────────────────────────────────────────

  /search:
    get:
      tags: [Search]
      summary: Full-text product search
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
          description: Search query string
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: category
          in: query
          schema: { type: string }
        - name: price_min
          in: query
          schema: { type: number }
        - name: price_max
          in: query
          schema: { type: number }
        - name: sort
          in: query
          schema:
            type: string
            enum: [relevance, price_asc, price_desc, rating, newest]
            default: relevance
      responses:
        '200':
          description: Search results with facets
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SearchResponse' }

  /search/suggestions:
    get:
      tags: [Search]
      summary: Autocomplete suggestions
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string, minLength: 2 }
      responses:
        '200':
          description: Suggestion list
          content:
            application/json:
              schema:
                type: object
                properties:
                  suggestions:
                    type: array
                    items: { type: string }

  # ── CART ─────────────────────────────────────────────────

  /cart:
    get:
      tags: [Cart]
      summary: Get current cart (auth or guest via session cookie)
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Cart contents
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Cart' }
    post:
      tags: [Cart]
      summary: Add item to cart
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddToCartRequest' }
      responses:
        '200':
          description: Updated cart
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Cart' }
        '409':
          description: Insufficient stock
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /cart/items/{cartItemId}:
    parameters:
      - $ref: '#/components/parameters/CartItemId'
    patch:
      tags: [Cart]
      summary: Update item quantity
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateCartItemRequest' }
      responses:
        '200':
          description: Updated cart
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Cart' }
    delete:
      tags: [Cart]
      summary: Remove item from cart
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Updated cart
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Cart' }

  /cart/merge:
    post:
      tags: [Cart]
      summary: Merge guest cart into user cart on login
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id]
              properties:
                session_id: { type: string }
      responses:
        '200':
          description: Merged cart
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Cart' }

  # ── ORDERS ───────────────────────────────────────────────

  /orders:
    get:
      tags: [Orders]
      summary: List current user's orders
      security: [{ BearerAuth: [] }]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, processing, shipped, delivered, cancelled, refunded]
      responses:
        '200':
          description: Paginated order list
          content:
            application/json:
              schema:
                type: object
                properties:
                  pagination: { $ref: '#/components/schemas/Pagination' }
                  orders:
                    type: array
                    items: { $ref: '#/components/schemas/OrderSummary' }
    post:
      tags: [Orders]
      summary: Place an order from current cart
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PlaceOrderRequest' }
      responses:
        '201':
          description: Order placed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrderDetail' }
        '400':
          description: Cart empty or stock issue
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /orders/{orderId}:
    parameters:
      - $ref: '#/components/parameters/OrderId'
    get:
      tags: [Orders]
      summary: Get order detail
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Order detail with items and shipments
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrderDetail' }
        '404':
          description: Order not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /orders/{orderId}/cancel:
    parameters:
      - $ref: '#/components/parameters/OrderId'
    post:
      tags: [Orders]
      summary: Cancel an order (only if pending/confirmed)
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Order cancelled
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrderDetail' }
        '409':
          description: Order cannot be cancelled at current status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ── COUPONS ──────────────────────────────────────────────

  /coupons/validate:
    post:
      tags: [Promotions]
      summary: Validate a coupon code
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CouponValidateRequest' }
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CouponValidateResponse' }

  # ── WISHLIST ─────────────────────────────────────────────

  /wishlist:
    get:
      tags: [Wishlist]
      summary: Get current user's wishlist
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Wishlist items
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/WishlistItem' }
    post:
      tags: [Wishlist]
      summary: Add item to wishlist
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [variant_id]
              properties:
                variant_id: { type: string, format: uuid }
      responses:
        '201':
          description: Added to wishlist
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WishlistItem' }

  /wishlist/{variantId}:
    parameters:
      - name: variantId
        in: path
        required: true
        schema: { type: string, format: uuid }
    delete:
      tags: [Wishlist]
      summary: Remove item from wishlist
      security: [{ BearerAuth: [] }]
      responses:
        '204':
          description: Removed

# ── Tags ────────────────────────────────────────────────────
tags:
  - name: Auth
    description: Registration, login, token refresh, password reset
  - name: User
    description: Profile and address management
  - name: Catalog
    description: Categories, products, variants, reviews
  - name: Search
    description: Full-text search and autocomplete
  - name: Cart
    description: Cart management (authenticated and guest)
  - name: Orders
    description: Order placement and history
  - name: Promotions
    description: Coupon validation
  - name: Wishlist
    description: Saved items
